services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apiaas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-apiaas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiaas"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "443:443"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_started
    volumes:
      - certs:/certs

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - certs:/certs
    depends_on:
      - api

  inference:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  postgres_data:
  certs:
  ollama_data:
